name: Release Multiplatform Builds

on:
  workflow_dispatch:

jobs:
  desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-release.txt

      - name: Build Windows executable
        run: |
          pyinstaller --noconfirm --clean --name neon-surge --windowed --add-data "game/assets;game/assets" main.py

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-surge-windows
          path: dist/neon-surge/**

  web-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-release.txt

      - name: Build browser package
        run: python -m pygbag --build main.py

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-surge-web
          path: build/web/**

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Android build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-release.txt

      - name: Build Android debug APK
        run: buildozer android debug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-surge-android
          path: bin/*.apk
